<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B97同學會 - 住宿投票</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #ff5a5f 0%, #ff385c 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.95;
            font-size: 16px;
        }
        
        .step {
            padding: 24px 30px;
            display: none;
        }
        
        .step.active {
            display: block;
        }
        
        .step h2 {
            color: #222;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
        }
        
        .person-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }
        
        .person-btn {
            padding: 14px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-align: center;
            font-weight: 500;
            color: #333;
        }
        
        .person-btn:hover {
            border-color: #ff5a5f;
            background: #fff5f5;
        }
        
        .person-btn.selected {
            background: #ff5a5f;
            color: white;
            border-color: #ff5a5f;
        }
        
        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 16px;
            margin-bottom: 16px;
            border-bottom: 1px solid #eee;
            -webkit-overflow-scrolling: touch;
        }
        
        .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 24px;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .tab-btn:hover {
            background: #e0e0e0;
        }
        
        .tab-btn.active {
            background: #ff5a5f;
            color: white;
        }
        
        .region-section {
            display: none;
        }
        
        .region-section.active {
            display: block;
        }
        
        .region-title {
            font-size: 18px;
            font-weight: 600;
            color: #222;
            margin-bottom: 16px;
        }
        
        .option-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
            transition: all 0.2s;
            background: white;
        }
        
        .option-card:hover {
            border-color: #ff5a5f;
            box-shadow: 0 4px 12px rgba(255,90,95,0.1);
        }
        
        .option-card.selected {
            border-color: #ff5a5f;
            background: #fff9f9;
        }
        
        .option-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .option-name {
            font-size: 17px;
            font-weight: 600;
            color: #222;
            flex: 1;
        }
        
        .option-name a {
            color: #ff5a5f;
            text-decoration: none;
            font-size: 13px;
            font-weight: normal;
            margin-left: 8px;
        }
        
        .option-name a:hover {
            text-decoration: underline;
        }
        
        .option-price {
            text-align: right;
        }
        
        .option-price .amount {
            font-size: 20px;
            font-weight: 700;
            color: #ff5a5f;
        }
        
        .option-price .per-person {
            font-size: 13px;
            color: #717171;
        }
        
        .option-info {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .info-tag {
            background: #f7f7f7;
            color: #555;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .pros-cons {
            display: flex;
            gap: 12px;
            margin: 12px 0;
            font-size: 13px;
        }
        
        .pros, .cons {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
        }
        
        .pros {
            background: #e8f5e9;
        }
        
        .cons {
            background: #ffebee;
        }
        
        .pros h4, .cons h4 {
            font-size: 12px;
            margin-bottom: 6px;
        }
        
        .pros h4 { color: #2e7d32; }
        .cons h4 { color: #c62828; }
        
        .pros ul, .cons ul {
            padding-left: 16px;
            margin: 0;
        }
        
        .pros li, .cons li {
            margin-bottom: 2px;
        }
        
        .vote-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
        
        .checkbox-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }
        
        .checkbox-btn:hover {
            border-color: #ff5a5f;
        }
        
        .checkbox-btn.checked {
            background: #ff5a5f;
            color: white;
            border-color: #ff5a5f;
        }
        
        .any-option {
            background: #fff8e1;
            border-color: #ffc107;
        }
        
        .any-option:hover {
            border-color: #ff9800;
        }
        
        .any-option.checked {
            background: #ffc107;
            color: white;
            border-color: #ffc107;
        }
        
        .btn {
            background: linear-gradient(135deg, #ff5a5f 0%, #ff385c 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,90,95,0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            text-align: center;
            padding: 40px 30px;
        }
        
        .result h2 {
            color: #00aa6c;
            margin-bottom: 16px;
        }
        
        .result-summary {
            background: #f7f7f7;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-top: 20px;
        }
        
        .result-item {
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 15px;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .note {
            background: #e8f5e9;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #2e7d32;
            line-height: 1.5;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #717171;
            font-size: 13px;
            border-top: 1px solid #eee;
        }
        
        @media (max-width: 600px) {
            .header h1 {
                font-size: 26px;
            }
            
            .option-header {
                flex-direction: column;
                gap: 8px;
            }
            
            .option-price {
                text-align: left;
            }
            
            .person-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .pros-cons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

            <!-- Tab Navigation -->

            <!-- Any Option -->

                        </div>
                        <div class="cons">

                            </ul>
                        </div>
                    </div>
                    <div class="vote-section">

                    </div>
                </div>
            </div>
            
            <!-- 宜蘭 -->
            <div class="region-section" id="region-宜蘭">
                <div class="region-title">📍 宜蘭</div>

            <!-- 臺中 -->

            <!-- 苗栗 -->

            <!-- 南投 -->

                <div id="options-南投"></div>
            </div>
            
            <!-- 彰化 -->
            <div class="region-section" id="region-彰化">
                <div class="region-title">📍 彰化縣</div>
                <div id="options-彰化"></div>
            </div>
            
            <button class="btn" id="submitBtn" disabled>送出確認 ✅</button>
        </div>
        
        <!-- Step 3: 結果 -->

                <p>感謝您的參與～</p>
                <div class="result-summary" id="resultSummary"></div>
            </div>
        </div>
        
        <div class="footer">
            B97同學會 © 2026
        </div>
    </div>

            },
            {

                cons: ["空間很小", "14人無法同住", "需分開訂房", "無娛樂設施"],
                region: "彰化"
            }
        ];
        
        // ====== 程式邏輯 ======
        let selectedPerson = null;
        let selectedOptions = [];
        
        // 初始化
        function init() {
            renderParticipants();
            renderOptions();
            setupTabs();
            
            document.getElementById('step1Btn').addEventListener('click', goToStep2);
            document.getElementById('submitBtn').addEventListener('click', submitVote);
        }
        
        // 渲染參與者列表
        function renderParticipants() {
            const grid = document.getElementById('personGrid');
            participants.forEach(name => {
                const btn = document.createElement('div');
                btn.className = 'person-btn';
                btn.textContent = name;
                btn.addEventListener('click', () => selectPerson(name, btn));
                grid.appendChild(btn);
            });
        }
        
        // 選擇參與者
        function selectPerson(name, btn) {
            document.querySelectorAll('.person-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedPerson = name;
            document.getElementById('step1Btn').disabled = false;
        }
        
        // 渲染住宿選項（按地區分類）
        function renderOptions() {
            const regions = ["宜蘭", "臺中", "苗栗", "南投", "彰化"];
            
            regions.forEach(region => {
                const container = document.getElementById(`options-${region}`);
                const options = accommodations.filter(o => o.region === region);
                
                options.forEach(option => {
                    container.appendChild(createOptionCard(option));
                });
            });
        }
        
        // 建立選項卡片
        function createOptionCard(option) {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.dataset.id = option.id;
            
            let urlHTML = option.url ? `<a href="${option.url}" target="_blank">查看詳情</a>` : '';
            
            let priceHTML = `
                <div class="option-price">
                    <div class="amount">$${option.price.toLocaleString()}</div>
                    <div class="per-person">約 $${option.pricePerPerson.toLocaleString()}/人</div>
                </div>
            `;
            
            card.innerHTML = `
                <div class="option-header">
                    <div class="option-name">${option.name} ${urlHTML}</div>
                    ${priceHTML}
                </div>
                <div class="option-info">
                    <span class="info-tag">👥 ${option.capacity}</span>
                    <span class="info-tag">📐 ${option.size}</span>
                    ${option.entertainment ? `<span class="info-tag">🎮 ${option.entertainment}</span>` : ''}
                </div>
                <div class="pros-cons">
                    <div class="pros">
                        <h4>✅ 優點</h4>
                        <ul>${option.pros.map(p => `<li>${p}</li>`).join('')}</ul>
                    </div>
                    <div class="cons">
                        <h4>⚠️ 缺點</h4>
                        <ul>${option.cons.map(c => `<li>${c}</li>`).join('')}</ul>
                    </div>
                </div>
                <div class="vote-section">
                    <div class="checkbox-btn" data-id="${option.id}" onclick="toggleOption(${option.id}, false)">
                        👍 投我一票
                    </div>
                </div>
            `;
            
            return card;
        }
        
        // Tab 切換
        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    // 更新按鈕狀態
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // 顯示對應區域
                    const region = btn.dataset.region;
                    document.querySelectorAll('.region-section').forEach(s => s.classList.remove('active'));
                    document.getElementById(`region-${region}`).classList.add('active');
                });
            });
        }
        
        // 切換選項
        function toggleOption(id, isAny) {
            const btn = document.querySelector(`.checkbox-btn[data-id="${id}"]`);
            const card = document.querySelector(`.option-card[data-id="${id}"]`);
            
            if (!btn || !card) return;
            
            if (btn.classList.contains('checked')) {
                btn.classList.remove('checked');
                card.classList.remove('selected');
                selectedOptions = selectedOptions.filter(o => o !== id);
            } else {
                const currentVotes = selectedOptions.filter(o => o !== 99);
                
                if (currentVotes.length >= 2 && !isAny) {
                    alert('最多只能投2票喔！（不含"我最隨意"）');
                    return;
                }
                
                if (isAny) {
                    selectedOptions = selectedOptions.filter(o => o !== 99);
                    document.querySelectorAll('.any-option').forEach(b => {
                        b.classList.remove('checked');
                    });
                } else {
                    selectedOptions = selectedOptions.filter(o => o === 99);
                    document.querySelectorAll('.any-option').forEach(b => {
                        b.classList.remove('checked');
                    });
                    document.querySelectorAll('.option-card:not(.any-option)').forEach(c => {
                        c.classList.remove('selected');
                    });
                }
                
                btn.classList.add('checked');
                card.classList.add('selected');
                selectedOptions.push(id);
            }
            
            document.getElementById('submitBtn').disabled = selectedOptions.length === 0;
        }
        
        // 前往第二步
        function goToStep2() {
            if (!selectedPerson) return;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }
        
        // 送出投票
        function submitVote() {
            const selectedNames = selectedOptions.map(id => {
                return accommodations.find(a => a.id === id)?.name || "我最隨意";
            });
            
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
            
            document.getElementById('resultSummary').innerHTML = `
                <div class="result-item"><strong>👤 投票人：</strong>${selectedPerson}</div>
                <div class="result-item"><strong>🏠 選擇的住宿：</strong></div>
                ${selectedNames.map(name => `<div style="margin-left:16px;padding:6px">• ${name}</div>`).join('')}
            `;
            
            console.log('投票資料：', {
                person: selectedPerson,
                votes: selectedNames
            });
        }
        
        // 啟動
        init();
    </script>
</body>
</html>
