<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B97同學會 - 住宿投票</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #ff5a5f 0%, #ff385c 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.95;
            font-size: 16px;
        }
        
        .step {
            padding: 30px;
            display: none;
        }
        
        .step.active {
            display: block;
        }
        
        .step h2 {
            color: #222;
            margin-bottom: 24px;
            font-size: 20px;
            font-weight: 600;
        }
        
        .person-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        
        .person-btn {
            padding: 16px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
            text-align: center;
            font-weight: 500;
            color: #333;
        }
        
        .person-btn:hover {
            border-color: #ff5a5f;
            background: #fff5f5;
        }
        
        .person-btn.selected {
            background: #ff5a5f;
            color: white;
            border-color: #ff5a5f;
        }
        
        .region-section {
            margin-bottom: 30px;
        }
        
        .region-title {
            font-size: 18px;
            font-weight: 600;
            color: #222;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #ff5a5f;
            display: inline-block;
        }
        
        .option-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.2s;
            background: white;
        }
        
        .option-card:hover {
            border-color: #ff5a5f;
            box-shadow: 0 4px 12px rgba(255,90,95,0.1);
        }
        
        .option-card.selected {
            border-color: #ff5a5f;
            background: #fff9f9;
        }
        
        .option-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .option-name {
            font-size: 17px;
            font-weight: 600;
            color: #222;
            flex: 1;
        }
        
        .option-price {
            text-align: right;
        }
        
        .option-price .amount {
            font-size: 20px;
            font-weight: 700;
            color: #ff5a5f;
        }
        
        .option-price .per-person {
            font-size: 13px;
            color: #717171;
        }
        
        .option-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .tag {
            background: #f7f7f7;
            color: #717171;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .vote-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
        
        .checkbox-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }
        
        .checkbox-btn:hover {
            border-color: #ff5a5f;
        }
        
        .checkbox-btn.checked {
            background: #ff5a5f;
            color: white;
            border-color: #ff5a5f;
        }
        
        .any-option {
            background: #fff8e1;
            border-color: #ffc107;
        }
        
        .any-option:hover {
            border-color: #ff9800;
        }
        
        .any-option.checked {
            background: #ffc107;
            color: white;
            border-color: #ffc107;
        }
        
        .vote-count {
            color: #717171;
            font-size: 13px;
        }
        
        .btn {
            background: linear-gradient(135deg, #ff5a5f 0%, #ff385c 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,90,95,0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            text-align: center;
            padding: 40px 30px;
        }
        
        .result h2 {
            color: #00aa6c;
            margin-bottom: 16px;
        }
        
        .result-summary {
            background: #f7f7f7;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-top: 20px;
        }
        
        .result-item {
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 15px;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .note {
            background: #e8f5e9;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #2e7d32;
            line-height: 1.5;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #717171;
            font-size: 13px;
            border-top: 1px solid #eee;
        }
        
        @media (max-width: 600px) {
            .header h1 {
                font-size: 26px;
            }
            
            .option-header {
                flex-direction: column;
                gap: 8px;
            }
            
            .option-price {
                text-align: left;
            }
            
            .person-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 B97同學會</h1>
            <p>4月4日 - 家族旅行住宿投票</p>
        </div>
        
        <!-- Step 1: 選擇你是誰 -->
        <div class="step active" id="step1">
            <h2>👋 請選擇您的名字</h2>
            <div class="person-grid" id="personGrid"></div>
            <button class="btn" id="step1Btn" disabled>下一步</button>
        </div>
        
        <!-- Step 2: 投票 -->
        <div class="step" id="step2">
            <h2>🗳️ 請選擇住宿偏好（最多2票）</h2>
            <div class="note">
                💡 您可以選擇 2 個喜歡的選項 + 1 個「我都可」選項<br>
                💰 費用僅計算大人（12位）
            </div>
            <div id="optionsContainer"></div>
            <button class="btn" id="submitBtn" disabled>送出確認 ✅</button>
        </div>
        
        <!-- Step 3: 結果 -->
        <div class="step" id="step3">
            <div class="result">
                <h2>✅ 投票完成！</h2>
                <p>感謝您的參與～</p>
                <div class="result-summary" id="resultSummary"></div>
            </div>
        </div>
        
        <div class="footer">
            B97同學會 © 2026
        </div>
    </div>

    <script>
        // ====== 設定資料 ======
        const participants = [
            "阿財", "莊胖", "mo", "仁", "柏穎", 
            "小郭", "徵", "小K", "晃", "阿舍", 
            "雞滑", "雞翔"
        ];
        
        const adultCount = 12;
        
        const accommodations = [
            // 我都可（放最上面）
            {
                id: 99,
                name: "👍 我都OK",
                location: "",
                price: 0,
                pricePerPerson: "",
                pros: ["配合大家", "沒意見"],
                cons: [],
                isAny: true,
                region: ""
            },
            // 宜蘭
            {
                id: 1,
                name: "陌野私人會所",
                location: "宜蘭縣員山鄉",
                price: 39800,
                pricePerPerson: Math.round(39800 / adultCount),
                pros: ["最多30人", "KTV/麻將/Switch/烤肉", "獨立別墅隱私好"],
                cons: ["宜蘭偏遠", "需要開車"],
                region: "宜蘭"
            },
            {
                id: 2,
                name: "蒔光無境",
                location: "宜蘭縣",
                price: 39800,
                pricePerPerson: Math.round(39800 / adultCount),
                pros: ["最多30人", "8房3廳", "KTV/麻將/烤肉"],
                cons: ["宜蘭偏遠"],
                region: "宜蘭"
            },
            {
                id: 3,
                name: "闊野渡假私人會所",
                location: "宜蘭縣",
                price: 40800,
                pricePerPerson: Math.round(40800 / adultCount),
                pros: ["包棟別墅", "設施齊全"],
                cons: ["宜蘭偏遠"],
                region: "宜蘭"
            },
            {
                id: 4,
                name: "Tomo包棟民宿",
                location: "宜蘭縣頭城鎮",
                price: 24113,
                pricePerPerson: Math.round(24113 / adultCount),
                pros: ["包棟", "價格較便宜"],
                cons: ["宜蘭偏遠"],
                region: "宜蘭"
            },
            {
                id: 5,
                name: "宜蘭兔樂包棟",
                location: "宜蘭縣",
                price: 32036,
                pricePerPerson: Math.round(32036 / adultCount),
                pros: ["Villa別墅", "包棟"],
                cons: ["宜蘭偏遠"],
                region: "宜蘭"
            },
            // 臺中市
            {
                id: 6,
                name: "莫家莊",
                location: "臺中市后里區",
                price: 51671,
                pricePerPerson: Math.round(51671 / adultCount),
                pros: ["麗寶樂園附近", "有電梯", "可求婚/抓周"],
                cons: ["距離遠"],
                region: "臺中市"
            },
            {
                id: 7,
                name: "逢甲商圈包棟",
                location: "臺中市",
                price: 36285,
                pricePerPerson: Math.round(36285 / adultCount),
                pros: ["逢甲夜市5分鐘", "有電梯", "廚房/麻將"],
                cons: ["最多25人可能不夠"],
                region: "臺中市"
            },
            // 苗栗
            {
                id: 8,
                name: "宣余美術莊園",
                location: "苗栗縣銅鑼鄉",
                price: 37892,
                pricePerPerson: Math.round(37892 / adultCount),
                pros: ["莊園別墅", "環境優美"],
                cons: [""],
                region: "苗栗"
            },
            // 南投
            {
                id: 9,
                name: "瑞龍山居",
                location: "南投縣",
                price: 50638,
                pricePerPerson: Math.round(50638 / adultCount),
                pros: ["山景優美", "包棟民宿"],
                cons: ["較偏遠"],
                region: "南投"
            }
        ];
        
        // ====== 程式邏輯 ======
        let selectedPerson = null;
        let selectedOptions = [];
        
        // 初始化
        function init() {
            renderParticipants();
            renderOptions();
            
            document.getElementById('step1Btn').addEventListener('click', goToStep2);
            document.getElementById('submitBtn').addEventListener('click', submitVote);
        }
        
        // 渲染參與者列表
        function renderParticipants() {
            const grid = document.getElementById('personGrid');
            participants.forEach(name => {
                const btn = document.createElement('div');
                btn.className = 'person-btn';
                btn.textContent = name;
                btn.addEventListener('click', () => selectPerson(name, btn));
                grid.appendChild(btn);
            });
        }
        
        // 選擇參與者
        function selectPerson(name, btn) {
            document.querySelectorAll('.person-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedPerson = name;
            document.getElementById('step1Btn').disabled = false;
        }
        
        // 渲染住宿選項（按地區分類）
        function renderOptions() {
            const container = document.getElementById('optionsContainer');
            
            // 先顯示"我都可"
            const anyOption = accommodations.find(o => o.isAny);
            container.appendChild(createOptionCard(anyOption));
            
            // 按地區分組
            const regions = ["宜蘭", "臺中市", "苗栗", "南投"];
            regions.forEach(region => {
                const options = accommodations.filter(o => o.region === region);
                if (options.length > 0) {
                    const regionSection = document.createElement('div');
                    regionSection.className = 'region-section';
                    regionSection.innerHTML = `<div class="region-title">📍 ${region}</div>`;
                    
                    options.forEach(option => {
                        regionSection.appendChild(createOptionCard(option));
                    });
                    
                    container.appendChild(regionSection);
                }
            });
        }
        
        // 建立選項卡片
        function createOptionCard(option) {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.dataset.id = option.id;
            
            if (option.isAny) {
                card.classList.add('any-option');
            }
            
            let tagsHTML = '';
            if (option.pros.length > 0) {
                const displayPros = option.pros.slice(0, 3);
                tagsHTML = `<div class="option-tags">${displayPros.map(p => `<span class="tag">${p}</span>`).join('')}</div>`;
            }
            
            let priceHTML = '';
            if (!option.isAny) {
                priceHTML = `
                    <div class="option-price">
                        <div class="amount">$${option.price.toLocaleString()}</div>
                        <div class="per-person">約 $${option.pricePerPerson.toLocaleString()}/人</div>
                    </div>
                `;
            }
            
            card.innerHTML = `
                <div class="option-header">
                    <div class="option-name">${option.name}</div>
                    ${priceHTML}
                </div>
                ${option.location ? `<div style="color:#717171;font-size:14px;margin-bottom:8px">📍 ${option.location}</div>` : ''}
                ${tagsHTML}
                <div class="vote-section">
                    <div class="checkbox-btn ${option.isAny ? 'any-option' : ''}" data-id="${option.id}" onclick="toggleOption(${option.id}, ${option.isAny})">
                        ${option.isAny ? '👍 我都OK' : '👍 投我一票'}
                    </div>
                </div>
            `;
            
            return card;
        }
        
        // 切換選項
        function toggleOption(id, isAny) {
            const btn = document.querySelector(`.checkbox-btn[data-id="${id}"]`);
            const card = document.querySelector(`.option-card[data-id="${id}"]`);
            
            if (btn.classList.contains('checked')) {
                btn.classList.remove('checked');
                card.classList.remove('selected');
                selectedOptions = selectedOptions.filter(o => o !== id);
            } else {
                const currentVotes = selectedOptions.filter(o => {
                    const opt = accommodations.find(a => a.id === o);
                    return opt && !opt.isAny;
                });
                
                if (currentVotes.length >= 2 && !isAny) {
                    alert('最多只能投2票喔！（不含"我都OK"）');
                    return;
                }
                
                if (isAny) {
                    selectedOptions = selectedOptions.filter(o => {
                        const opt = accommodations.find(a => a.id === o);
                        return opt && !opt.isAny;
                    });
                    document.querySelectorAll('.any-option .checkbox-btn').forEach(b => {
                        b.classList.remove('checked');
                        b.closest('.option-card').classList.remove('selected');
                    });
                }
                
                btn.classList.add('checked');
                card.classList.add('selected');
                selectedOptions.push(id);
            }
            
            document.getElementById('submitBtn').disabled = selectedOptions.length === 0;
        }
        
        // 前往第二步
        function goToStep2() {
            if (!selectedPerson) return;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }
        
        // 送出投票
        function submitVote() {
            const selectedNames = selectedOptions.map(id => {
                return accommodations.find(a => a.id === id).name;
            });
            
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
            
            document.getElementById('resultSummary').innerHTML = `
                <div class="result-item"><strong>👤 投票人：</strong>${selectedPerson}</div>
                <div class="result-item"><strong>🏠 選擇的住宿：</strong></div>
                ${selectedNames.map(name => `<div style="margin-left:16px;padding:6px">• ${name}</div>`).join('')}
            `;
            
            console.log('投票資料：', {
                person: selectedPerson,
                votes: selectedNames
            });
        }
        
        // 啟動
        init();
    </script>
</body>
</html>
