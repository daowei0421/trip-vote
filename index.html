            } else {
                uniqueVotes.forEach((v, i) => {
                    html += '<div style="background:#f5f5f5;padding:10px;margin-bottom:10px;border-radius:8px">';
                    html += '<strong>' + (i+1) + '. ' + v.person + '</strong>';
                    html += '<br>🏠 ' + v.votes.join('、');
                    if (v.time) html += '<br><small style="color:#999">' + v.time + '</small>';
                    html += '</div>';
                });
            }
            
            html += '<button onclick="document.getElementById(\'step1\').style.display=\'block\';document.getElementById(\'voteResult\').style.display=\'none\'" style="margin-top:15px;padding:10px 20px;background:#666;color:white;border:none;border-radius:20px">🔙 返回</button>';
            html += '</div>';
            
            document.getElementById('step1').style.display = 'none';
            
            let resultDiv = document.getElementById('voteResult');
            if (!resultDiv) {
                resultDiv = document.createElement('div');
                resultDiv.id = 'voteResult';
                document.querySelector('.container').appendChild(resultDiv);
            }
            resultDiv.innerHTML = html;
            resultDiv.style.display = 'block';
        }
        
        // 清空投票
        function clearVotes() {
            if (confirm('確定要清空所有投票嗎？此動作無法復原！')) {
                localStorage.removeItem('tripVotes');
                alert('已清空！');
            }
        }
        
        function saveVote(person, votes) {
            const votesData = getVotes();
            votesData.push({ person: person, votes: votes, time: new Date().toLocaleTimeString() });
            try {
                localStorage.setItem('tripVotes', JSON.stringify(votesData));
            } catch(e) {}
        }
        
        function getVoteStats() {
            const votesData = getVotes();
            const stats = {};
            votesData.forEach(v => {
                v.votes.forEach(name => {
                    stats[name] = (stats[name] || 0) + 1;
                });
            });
            return stats;
        }
        
        // 初始化
        function init() {
            renderParticipants();
            renderOptions();
            setupTabs();
            
            document.getElementById('step1Btn').addEventListener('click', goToStep2);
            document.getElementById('submitBtn').addEventListener('click', submitVote);
        }
        
        // 渲染參與者列表
        function renderParticipants() {
            const grid = document.getElementById('personGrid');
            participants.forEach(name => {
                const btn = document.createElement('div');
                btn.className = 'person-btn';
                btn.textContent = name;
                btn.addEventListener('click', () => selectPerson(name, btn));
                grid.appendChild(btn);
            });
        }
        
        // 選擇參與者
        function selectPerson(name, btn) {
            document.querySelectorAll('.person-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedPerson = name;
            document.getElementById('step1Btn').disabled = false;
        }
        
        // 渲染住宿選項（按地區分類）
        function renderOptions() {
            const regions = ["宜蘭", "臺中", "苗栗", "南投", "彰化"];
            
            regions.forEach(region => {
                const container = document.getElementById(`options-${region}`);
                const options = accommodations.filter(o => o.region === region);
                
                options.forEach(option => {
                    container.appendChild(createOptionCard(option));
                });
            });
        }
        
        // 建立選項卡片
        function createOptionCard(option) {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.dataset.id = option.id;
            
            // 圖片
            let imageHTML = '';
            if (option.image) {
                imageHTML = `<img src="${option.image}" alt="${option.name}" class="option-image" onerror="this.style.display='none'">`;
            }
            
            let urlHTML = option.url ? `<a href="${option.url}" target="_blank">查看詳情</a>` : '';
            
            let priceHTML = `
                <div class="option-price">
                    <div class="amount">$${option.price.toLocaleString()}</div>
                    <div class="per-person">約 $${option.pricePerPerson.toLocaleString()}/人</div>
                </div>
            `;
            
            card.innerHTML = `
                ${imageHTML}
                <div class="option-content">
                    <div class="option-header">
                        <div class="option-name">${option.name} ${urlHTML}</div>
                        ${priceHTML}
                    </div>
                    <div class="option-info">
                        <span class="info-tag">👥 ${option.capacity}</span>
                        <span class="info-tag">📐 ${option.size}</span>
                        ${option.entertainment ? `<span class="info-tag">🎮 ${option.entertainment}</span>` : ''}
                    </div>
                    <div class="pros-cons">
                        <div class="pros">
                            <h4>✅ 優點</h4>
                            <ul>${option.pros.map(p => `<li>${p}</li>`).join('')}</ul>
                        </div>
                        <div class="cons">
                            <h4>⚠️ 缺點</h4>
                            <ul>${option.cons.map(c => `<li>${c}</li>`).join('')}</ul>
                        </div>
                    </div>
                    <div class="vote-section">
                        <div class="checkbox-btn" data-id="${option.id}" onclick="toggleOption(${option.id}, false)">
                            👍 投我一票
                        </div>
                    </div>
                </div>
            `;
            
            return card;
        }
        
        // Tab 切換
        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    // 更新按鈕狀態
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // 顯示對應區域
                    const region = btn.dataset.region;
                    document.querySelectorAll('.region-section').forEach(s => s.classList.remove('active'));
                    document.getElementById(`region-${region}`).classList.add('active');
                    
                    // 如果點"我都可以"，直接觸發選擇
                    if (region === 'any') {
                        toggleOption(99, true);
                    }
                });
            });
        }
        
        // 投票"我都可以"
        function voteAny() {
            if (!selectedPerson) {
                alert('請先選擇您的名字！');
                return;
            }
            
            const votes = ["我都可以"];
            saveVote(selectedPerson, votes);
            
            showResultScreen(votes);
        }
        
        // 顯示結果畫面
        function showResultScreen(votes) {
            const stats = getVoteStats();
            let html = '<div style="text-align:center;padding:20px">';
            html += '<h2 style="color:#00aa6c">✅ 投票完成！</h2>';
            html += '<p>👤 <strong>' + selectedPerson + '</strong></p>';
            html += '<p>🏠 選擇：' + votes.join('、') + '</p>';
            
            if (Object.keys(stats).length > 0) {
                html += '<div style="margin-top:20px;padding:15px;background:#f5f5f5;border-radius:10px;text-align:left">';
                html += '<h4>📊 目前統計：</h4>';
                for (let name in stats) {
                    html += '<p>' + name + ': <strong>' + stats[name] + ' 票</strong></p>';
                }
                html += '</div>';
            }
            
            html += '<button onclick="location.reload()" style="margin-top:20px;padding:12px 30px;background:#ff5a5f;color:white;border:none;border-radius:25px;font-size:16px;cursor:pointer">🔄 重新投票</button>';
            html += '</div>';
            
            document.getElementById('step2').innerHTML = html;
        }
        
        // 切換選項
        function toggleOption(id, isAny) {
            const btn = document.querySelector(`.checkbox-btn[data-id="${id}"]`);
            const card = document.querySelector(`.option-card[data-id="${id}"]`);
            
            if (!btn || !card) return;
            
            if (btn.classList.contains('checked')) {
                btn.classList.remove('checked');
                card.classList.remove('selected');
                selectedOptions = selectedOptions.filter(o => o !== id);
            } else {
                // 如果選擇"我都可以"，直接完成投票
                if (isAny) {
                    selectedOptions = [id];
                    // 清除其他所有選擇
                    document.querySelectorAll('.checkbox-btn').forEach(b => b.classList.remove('checked'));
                    document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    btn.classList.add('checked');
                    card.classList.add('selected');
                } else {
                    // 一般選項
                    // 檢查是否已有2票
                    if (selectedOptions.length >= 2) {
                        alert('最多只能投2票！');
                        return;
                    }
                    
                    // 移除"我都可以"的選擇
                    selectedOptions = selectedOptions.filter(o => o !== 99);
                    document.querySelectorAll('.any-option').forEach(b => b.classList.remove('checked'));
                    document.querySelector('.any-option')?.closest('.option-card')?.classList.remove('selected');
                    
                    btn.classList.add('checked');
                    card.classList.add('selected');
                    selectedOptions.push(id);
                }
            }
            
            // 啟用送出按鈕
            document.getElementById('submitBtn').disabled = selectedOptions.length === 0;
        }
        
        // 前往第二步
        function goToStep2() {
            if (!selectedPerson) return;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }
        
        // 送出投票
        function submitVote() {
            const selectedNames = selectedOptions.map(id => {
                return accommodations.find(a => a.id === id)?.name || "我都可以";
            });
            
            // 保存投票
            saveVote(selectedPerson, selectedNames);
            
            // 显示结果
            showResultScreen(selectedNames);
        }
        
        // 啟動
        init();
    </script>
</body>
</html>
